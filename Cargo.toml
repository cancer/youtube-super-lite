[package]
name = "youtube-super-lite"
version = "0.1.0"
edition = "2021"
description = "A YouTube video player written in Rust (libmpv backend)"

[dependencies]
# Windowing / event loop
winit = "0.30"
raw-window-handle = "0.6"

# OpenGL context (mpv の get_proc_address を供給 / egui の描画先)
glutin = "0.32"
glutin-winit = "0.5"
glow = "0.14"

# 重ねて表示する操作UI（URL入力欄など）
egui = "0.29"
egui_glow = { version = "0.29", features = ["winit"] }
egui-winit = { version = "0.29", features = ["clipboard"] }
# URL からの画像読み込み（カスタム絵文字 = PNG/WEBP、動画サムネ = JPEG）。
egui_extras = { version = "0.29", default-features = false, features = ["image", "http"] }
image = { version = "0.25", default-features = false, features = ["png", "webp", "jpeg"] }

# mpv bindings (maintained fork of libmpv-rs)
libmpv2 = "6"

# YouTube Data API (OAuth + 高評価など)。native-tls(schannel) で ring/nasm を回避。
reqwest = { version = "0.12", default-features = false, features = ["blocking", "native-tls", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
anyhow = "1"
dash-mpd = { version = "0.20.3", default-features = false }
