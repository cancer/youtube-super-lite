<!-- @dsCard group="Components" viewport="700x520" name="Media — VideoCard / RowItem / PlaylistCard" subtitle="Cards & list rows built on semantic tokens" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;background:var(--s-bg-canvas);font-family:var(--p-font-sans);color:var(--s-text-primary);padding:24px;display:flex;flex-direction:column;gap:26px}
.thumb{position:relative;aspect-ratio:16/9;border-radius:var(--s-radius-container);overflow:hidden;background:linear-gradient(135deg,#3a3550,#20202b)}
.dur{position:absolute;right:8px;bottom:8px;background:var(--s-bg-scrim);color:var(--s-text-on-accent);font-size:var(--p-size-sm);font-weight:500;padding:3px 5px;border-radius:var(--s-radius-overlay)}
.live{position:absolute;left:8px;bottom:8px;display:inline-flex;gap:4px;align-items:center;background:var(--s-accent-live);color:#fff;font-size:var(--p-size-sm);font-weight:500;padding:3px 6px;border-radius:var(--s-radius-overlay)}
.live .d{width:6px;height:6px;border-radius:50%;background:#fff}
.av{width:36px;height:36px;border-radius:50%;flex:0 0 36px;background:var(--s-bg-elevated);display:flex;align-items:center;justify-content:center;font-weight:700}
.title{font-size:var(--p-size-md);line-height:var(--p-lh-md);font-weight:500;color:var(--s-text-primary);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ch{font-size:var(--p-size-sm);color:var(--s-text-secondary);margin-top:4px}
.meta{font-size:var(--p-size-sm);color:var(--s-text-secondary)}
.kb{flex:0 0 24px;color:var(--s-icon-muted)}
.lbl{font-size:12px;color:var(--s-text-secondary)}</style></head>
<body>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">
  <div>
    <div class="thumb"><span class="dur">1:11:13</span></div>
    <div style="display:flex;gap:12px;padding-top:12px"><div class="av">あ</div><div style="min-width:0;flex:1"><div class="title">【作業用】夜のローファイ・ヒップホップで集中する 3 時間</div><div class="ch">Lofi Channel ✓</div><div class="meta">4.3万回視聴・11 分前</div></div><div class="kb"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></div></div>
  </div>
  <div>
    <div class="thumb"><span class="live"><span class="d"></span>ライブ</span></div>
    <div style="display:flex;gap:12px;padding-top:12px"><div class="av" style="background:#5a3a3a">ぺ</div><div style="min-width:0;flex:1"><div class="title">【LIVE】新作ゲーム実況 ぶっ通し配信</div><div class="ch">ゲーム部 ✓</div><div class="meta">1.2万人が視聴中</div></div></div>
  </div>
</div>
<div><div class="lbl" style="margin-bottom:10px">RowItem (再生履歴)</div>
  <div style="display:flex;gap:16px"><div class="thumb" style="width:240px;flex:0 0 240px"><span class="dur">24:01</span></div><div style="flex:1"><div class="title" style="font-size:var(--p-size-lg);line-height:var(--p-lh-lg)">週末の散歩 Vlog — 鎌倉をのんびり歩く</div><div class="ch" style="margin-top:6px">Walk Japan</div><div class="meta">8.1万回視聴・3 時間前</div></div><div class="kb" style="flex:0 0 32px"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></div></div>
</div>
</body></html>
