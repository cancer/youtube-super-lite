<!-- @dsCard group="Colors" viewport="700x170" name="Surface hierarchy" subtitle="canvas → surface → elevated → selected" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--s-bg-canvas);font-family:var(--p-font-sans);color:var(--s-text-primary);padding:20px}.row{display:flex;gap:14px}.sw{flex:1}.chip{height:64px;border-radius:var(--s-radius-container);border:1px solid var(--s-border-subtle)}.n{font-size:11px;font-weight:700;margin-top:8px}.h{font-size:10px;color:var(--s-text-secondary)}</style></head><body><div class="row"><div class="sw"><div class="chip" style="background:var(--s-bg-canvas)"></div><div class="n">canvas</div><div class="h">地</div></div><div class="sw"><div class="chip" style="background:var(--s-bg-surface)"></div><div class="n">surface</div><div class="h">カード</div></div><div class="sw"><div class="chip" style="background:var(--s-bg-elevated)"></div><div class="n">elevated</div><div class="h">浮き</div></div><div class="sw"><div class="chip" style="background:var(--s-bg-selected)"></div><div class="n">selected</div><div class="h">選択</div></div></div></body></html>
