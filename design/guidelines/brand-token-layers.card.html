<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--s-bg-canvas);font-family:var(--p-font-sans);color:var(--s-text-primary);padding:20px}.flow{display:flex;align-items:center;gap:18px}.col{flex:1}.t{font-size:12px;font-weight:700;margin-bottom:8px}.row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--s-text-secondary);padding:4px 0}.sw{width:18px;height:18px;border-radius:4px;border:1px solid var(--s-border-subtle)}.arrow{font-size:22px;color:var(--s-text-secondary)}.code{font-family:var(--p-font-sans);color:var(--s-text-primary)}</style></head><body><div class="flow"><div class="col"><div class="t">Primitive (--p-*)</div><div class="row"><span class="sw" style="background:#0F0F0F"></span><span class="code">--p-gray-900</span></div><div class="row"><span class="sw" style="background:#CC0000"></span><span class="code">--p-red-600</span></div></div><div class="arrow">→</div><div class="col"><div class="t">Semantic (--s-*)</div><div class="row"><span class="sw" style="background:#0F0F0F"></span><span class="code">--s-bg-canvas</span></div><div class="row"><span class="sw" style="background:#CC0000"></span><span class="code">--s-accent-live</span></div></div><div class="arrow">→</div><div class="col"><div class="t">UI</div><div class="row code">背景・LIVE バッジ</div></div></div><div style="font-size:11px;color:var(--s-text-secondary);margin-top:14px">UI 実装はセマンティック層のみを参照する。</div></body></html>
