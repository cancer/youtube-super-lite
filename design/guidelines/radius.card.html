<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--s-bg-canvas);font-family:var(--p-font-sans);color:var(--s-text-primary);padding:20px}.row{display:flex;gap:20px;align-items:flex-end}.c{text-align:center}.box{width:64px;height:64px;background:var(--s-bg-elevated);border:1px solid var(--s-border-subtle)}.n{font-size:11px;color:var(--s-text-secondary);margin-top:7px}</style></head><body><div class="row"><div class="c"><div class="box" style="border-radius:var(--s-radius-overlay)"></div><div class="n">overlay</div></div><div class="c"><div class="box" style="border-radius:var(--s-radius-control-soft)"></div><div class="n">soft</div></div><div class="c"><div class="box" style="border-radius:var(--s-radius-container)"></div><div class="n">container</div></div><div class="c"><div class="box" style="border-radius:var(--s-radius-control-pill)"></div><div class="n">pill</div></div><div class="c"><div class="box" style="border-radius:var(--s-radius-circle)"></div><div class="n">circle</div></div></div></body></html>
