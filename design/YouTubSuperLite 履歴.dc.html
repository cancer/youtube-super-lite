<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  .app-scroll::-webkit-scrollbar{width:12px}
  .app-scroll::-webkit-scrollbar-thumb{background:#5a5a5a;border-radius:8px;border:3px solid #0f0f0f}
  .app-scroll::-webkit-scrollbar-track{background:transparent}
</style>
</helmet>
<div style="min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 120% at 50% 0%,#2a2a2e,#141416 60%,#0a0a0b);padding:32px;font-family:'Roboto','Noto Sans JP',sans-serif">

  <!-- Desktop window -->
  <div style="width:1320px;height:840px;border-radius:12px;overflow:hidden;background:#0f0f0f;box-shadow:0 30px 80px -20px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.06);display:flex;flex-direction:column">

    <!-- Custom title bar -->
    <div style="height:44px;flex:0 0 44px;background:#181818;border-bottom:1px solid #272727;display:flex;align-items:center;padding:0 14px;gap:14px;-webkit-app-region:drag">
      <div style="display:flex;align-items:center;gap:9px">
        <div style="width:22px;height:22px;border-radius:6px;background:#ff0033;display:flex;align-items:center;justify-content:center">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <span style="font-size:13px;font-weight:700;color:#f1f1f1;letter-spacing:.3px">YouTube Super Lite</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px;margin-left:auto;-webkit-app-region:no-drag">
        <div style="width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#aaa" style-hover="background:#e81123;color:#fff">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </div>
      </div>
    </div>

    <!-- Body: sidebar + content -->
    <div style="flex:1;display:flex;min-height:0">

      <!-- Sidebar -->
      <div class="app-scroll" style="width:224px;flex:0 0 224px;min-height:0;overflow-y:auto;background:#0f0f0f;border-right:1px solid #272727;padding:12px 8px;display:flex;flex-direction:column;gap:2px">
        <sc-for list="{{ nav }}" as="n" hint-placeholder-count="4">
          <div style="display:flex;align-items:center;gap:14px;height:40px;padding:0 14px;border-radius:10px;cursor:pointer;color:{{ n.color }};background:{{ n.bg }};font-size:13.5px;font-weight:{{ n.weight }}" style-hover="background:#1f1f1f">
            <span style="width:20px;height:20px;display:flex;align-items:center;justify-content:center" dangerouslySetInnerHTML="{{ n.icon }}"></span>
            <span>{{ n.label }}</span>
          </div>
        </sc-for>
        <div style="height:1px;background:#272727;margin:10px 6px"></div>
        <div style="font-size:11px;color:#777;font-weight:700;padding:6px 14px;letter-spacing:.5px;display:flex;align-items:center;gap:6px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="#f5b400"><path d="M12 2l2.4 5.6L20 8l-4 4 1 6-5-3-5 3 1-6-4-4 5.6-.4z"/></svg>お気に入り
        </div>
        <sc-for list="{{ favSubs }}" as="s" hint-placeholder-count="3">
          <div style="display:flex;align-items:center;gap:12px;height:38px;padding:0 14px;border-radius:10px;cursor:pointer" style-hover="background:#1f1f1f">
            <span style="position:relative;width:24px;height:24px;border-radius:50%;flex:0 0 24px;background:{{ s.color }};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;font-family:'Noto Sans JP'">{{ s.initial }}<sc-if value="{{ s.live }}" hint-placeholder-val="{{ true }}"><span style="position:absolute;inset:-3px;border:2px solid #f00;border-radius:50%"></span></sc-if></span>
            <span style="font-size:13px;color:#f1f1f1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ s.name }}</span>
          </div>
        </sc-for>
        <div style="font-size:11px;color:#777;font-weight:700;padding:6px 14px;letter-spacing:.5px;margin-top:6px">その他</div>
        <sc-for list="{{ otherSubs }}" as="s" hint-placeholder-count="2">
          <div style="display:flex;align-items:center;gap:12px;height:38px;padding:0 14px;border-radius:10px;cursor:pointer" style-hover="background:#1f1f1f">
            <span style="position:relative;width:24px;height:24px;border-radius:50%;flex:0 0 24px;background:{{ s.color }};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;font-family:'Noto Sans JP'">{{ s.initial }}</span>
            <span style="font-size:13px;color:#f1f1f1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ s.name }}</span>
          </div>
        </sc-for>
      </div>

      <!-- Content -->
      <div class="app-scroll" style="flex:1;min-width:0;overflow-y:auto;background:#0f0f0f;padding:28px 40px 56px">

        <!-- title -->
        <div style="font-family:'Noto Sans JP';font-size:32px;font-weight:700;color:#f1f1f1;letter-spacing:.5px;margin-bottom:28px">再生履歴</div>

        <!-- date groups -->
        <div style="max-width:760px">
          <sc-for list="{{ groups }}" as="g" hint-placeholder-count="2">
            <div style="font-family:'Noto Sans JP';font-size:18px;font-weight:700;color:#f1f1f1;margin:6px 0 14px">{{ g.label }}</div>
            <div style="display:flex;flex-direction:column;gap:18px;margin-bottom:30px">
              <sc-for list="{{ g.items }}" as="v" hint-placeholder-count="4">
                <div style="display:flex;gap:16px;cursor:pointer;align-items:flex-start" style-hover="opacity:0.97">
                  <!-- thumbnail -->
                  <div style="position:relative;width:246px;flex:0 0 246px;aspect-ratio:16/9;border-radius:12px;overflow:hidden;background:{{ v.bg }};box-shadow:0 0 0 1px rgba(255,255,255,0.04)">
                    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,0.4)">
                      <div style="font-family:'Noto Sans JP';font-weight:900;font-size:{{ v.bigSize }};line-height:1.05;color:{{ v.bigColor }};letter-spacing:1px;white-space:pre-line">{{ v.big }}</div>
                      <div style="font-family:'Noto Sans JP';font-weight:700;font-size:12px;color:{{ v.subColor }};margin-top:4px">{{ v.sub }}</div>
                    </div>
                    <sc-if value="{{ v.live }}" hint-placeholder-val="{{ true }}">
                      <div style="position:absolute;right:6px;bottom:6px;background:rgba(0,0,0,0.85);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;display:flex;align-items:center;gap:4px">
                        <span style="width:6px;height:6px;border-radius:50%;background:#f00;display:inline-block"></span>ライブ
                      </div>
                    </sc-if>
                    <sc-if value="{{ v.duration }}" hint-placeholder-val="2:09">
                      <div style="position:absolute;right:6px;bottom:6px;background:rgba(0,0,0,0.85);color:#fff;font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;display:flex;align-items:center;gap:4px" dangerouslySetInnerHTML="{{ v.durHtml }}"></div>
                    </sc-if>
                  </div>
                  <!-- info -->
                  <div style="min-width:0;flex:1;padding-top:2px">
                    <div style="font-size:15px;font-weight:500;line-height:1.4;color:#f1f1f1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">{{ v.title }}</div>
                    <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:#aaa;margin-top:7px">
                      <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ v.channel }}</span>
                      <sc-if value="{{ v.verified }}" hint-placeholder-val="{{ true }}">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="#aaa" style="flex:0 0 auto"><path d="M12 2l2.4 1.8 3-.3.6 2.9 2.6 1.6-1.2 2.8 1.2 2.8-2.6 1.6-.6 2.9-3-.3L12 22l-2.4-1.8-3 .3-.6-2.9L3.4 16l1.2-2.8L3.4 10.4 6 8.8l.6-2.9 3 .3L12 2zm-1.2 13l4.5-4.5-1.1-1.1-3.4 3.4-1.5-1.5-1.1 1.1 2.6 2.6z"/></svg>
                      </sc-if>
                      <span style="flex:0 0 auto">·</span>
                      <span style="white-space:nowrap;flex:0 0 auto">{{ v.meta }}</span>
                    </div>
                  </div>
                  <!-- menu -->
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="#aaa" style="flex:0 0 20px;margin-top:2px;cursor:pointer" style-hover="opacity:0.7"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                </div>
              </sc-for>
            </div>
          </sc-for>
        </div>

      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1384,&quot;height&quot;:904}}">
class Component extends DCLogic {
  renderVals() {
    const ic = {
      subs:'<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 8H4V6h16v2zm-2-6H6v2h12V2zM4 22h16a2 2 0 002-2V10H2v10a2 2 0 002 2zm6-8.5l6 3.5-6 3.5v-7z"/></svg>',
      history:'<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M13 3a9 9 0 00-9 9H1l4 4 4-4H6a7 7 0 117 7 7 7 0 01-4.9-2L6.7 18.4A9 9 0 1013 3zm-1 5v5l4.3 2.5.7-1.2-3.5-2.1V8z"/></svg>',
      playlist:'<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 10h11v2H3v-2zm0-4h11v2H3V6zm0 8h7v2H3v-2zm13-1v6l5-3-5-3z"/></svg>',
      recommend:'<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 5.6L20 8l-4 4 1 6-5-3-5 3 1-6-4-4 5.6-.4z"/></svg>'
    };
    const H = (s) => ({ __html:s });
    const nav = [
      { label:'登録チャンネル', icon:H(ic.subs), color:'#aaa', bg:'transparent', weight:500 },
      { label:'履歴', icon:H(ic.history), color:'#fff', bg:'#272727', weight:700 },
      { label:'再生リスト', icon:H(ic.playlist), color:'#aaa', bg:'transparent', weight:500 },
      { label:'おすすめ', icon:H(ic.recommend), color:'#aaa', bg:'transparent', weight:500 },
    ];
    const favSubs = [
      { name:'ACHRORA', initial:'A', color:'#7c5cff', live:true },
      { name:'水宮枢 Su Ch.', initial:'水', color:'#39a0e8', live:true },
      { name:'兎田ぺこら', initial:'ペ', color:'#d84a4a', live:true },
    ];
    const otherSubs = [
      { name:'夏色まつり', initial:'夏', color:'#ff9bb8' },
      { name:'ロボ子さん', initial:'ロ', color:'#ff7aa8' },
    ];

    const chips = [
      { label:'すべて', bg:'#f1f1f1', color:'#0f0f0f' },
      { label:'動画', bg:'#272727', color:'#f1f1f1' },
      { label:'ショート', bg:'#272727', color:'#f1f1f1' },
      { label:'ポッドキャスト', bg:'#272727', color:'#f1f1f1' },
      { label:'音楽', bg:'#272727', color:'#f1f1f1' },
    ];

    const noteHtml = H('<svg width="11" height="11" viewBox="0 0 24 24" fill="#fff"><path d="M12 3v10.6A4 4 0 1014 17V7h4V3z"/></svg><span>2:09</span>');
    const durHtml = (d) => H('<span>'+d+'</span>');

    const card = (o) => ({
      bg:o.bg, big:o.big, bigSize:o.bigSize||'30px', bigColor:o.bigColor||'#fff',
      sub:o.sub||'', subColor:o.subColor||'#ffffff',
      title:o.title, channel:o.channel, verified:!!o.verified, meta:o.meta,
      live:!!o.live, duration:o.duration||'', durHtml:o.durHtml||durHtml(o.duration||'')
    });

    const groups = [
      { label:'今日', items:[
        card({ bg:'linear-gradient(135deg,#e84a6f,#ff9a3c 60%,#ffd36e)', big:'2年目秋', bigSize:'34px', sub:'はじめての秋大会へ！', subColor:'#fff',
          title:'【パワプロ2026】2年目秋から!! 栄冠ナイン3年モードで新・桜咲高校はじめるぞおおおおおおおおおおおおおお！！！【ホロライブ/さくらみこ】',
          channel:'Miko Ch. さくらみこ', verified:true, meta:'2万 人が視聴中', live:true }),
        card({ bg:'linear-gradient(135deg,#1a2436,#2b3a52 55%,#46617f)', big:'逆転裁判3', bigSize:'30px', sub:'#6  異議あり！', subColor:'#7fd0a8',
          title:'【#6】逆転裁判３やるしゅばあああああああああ！！！！！：Phoenix Wright: Ace Attorney - Trials and Tribulations【ネタバレあり】',
          channel:'Subaru Ch. 大空スバル', verified:true, meta:'2.7万 人が視聴中', live:true }),
        card({ bg:'linear-gradient(135deg,#7a1fa2,#d63ad6 45%,#3ad6c8)', big:'OBF', bigSize:'46px', sub:'JOE KARR', subColor:'#ffe27a',
          title:'【MV】OBF / ジョー・カー【にじさんじ】',
          channel:'ジョー・カー Joe Rikiichi', verified:true, meta:'334万回視聴', duration:'2:09', durHtml:noteHtml }),
        card({ bg:'linear-gradient(135deg,#3a2a3a,#6a4a5a 55%,#caa0b0)', big:'もこもこ', bigSize:'30px', sub:'アルミホイル回', subColor:'#ffd0e0',
          title:'アルミホイルを巻くと世界が平和に',
          channel:'Sakuna Ch. 結城さくな', meta:'10万回視聴', duration:'2:55:51' }),
      ]},
      { label:'昨日', items:[
        card({ bg:'linear-gradient(135deg,#0a1a3a,#12305c 50%,#1a4a7a)', big:'EVO', bigSize:'42px', sub:'日本語実況 DAY2', subColor:'#7fbfff',
          title:'【日本語実況】Evo 2026 - Day2 Part 2「CAPCOM Pro Tour 2026 Premier」',
          channel:'Capcom Fighters JP', verified:true, meta:'62万回視聴', duration:'7:43:21' }),
        card({ bg:'linear-gradient(135deg,#ff8fb1,#ffd36e 70%)', big:'歌枠', bigSize:'40px', sub:'No.28 KARAOKE', subColor:'#fff',
          title:'【歌枠】No.28 ランチタイムに 6月最後のろぼめろでぃ〜 RBmelody 🎤【ホロライブ/ロボ子さん】',
          channel:'Roboco Ch. ロボ子', verified:true, meta:'18万回視聴', duration:'1:32:08' }),
        card({ bg:'linear-gradient(135deg,#0a0a14,#1a2a4a 60%,#3a5a8a)', big:'#10', bigSize:'48px', sub:'ドラゴンクエストⅥ', subColor:'#ffd86e',
          title:'#10【SFC】完全初見！ドラゴンクエストⅥ 幻の大地 ぺこ！【ホロライブ/兎田ぺこら】',
          channel:'Pekora Ch. 兎田ぺこら', verified:true, meta:'42万回視聴', duration:'4:18:55' }),
        card({ bg:'linear-gradient(135deg,#1e6f6a,#2fa89a 55%,#9fe0d6)', big:'同時視聴', bigSize:'28px', sub:'サンリオ大賞', subColor:'#d6fff8',
          title:'【同時視聴】サンリオキャラクター大賞同時視聴！今年のプリンくんの順位は…！？【儒烏風亭らでん #ReGLOSS】',
          channel:'Raden Ch. 儒烏風亭らでん #ReGLOSS', verified:true, meta:'25万回視聴', duration:'3:07:42' }),
      ]},
    ];

    return { nav, favSubs, otherSubs, chips, groups };
  }
}
</script>
</body>
</html>
